name: JEAC Weekly Investment Strategy

on:
  schedule:
    # Saturday 10:00 Asia/Taipei = Saturday 02:00 UTC.
    - cron: "0 2 * * 6"
  workflow_dispatch:
    inputs:
      force_run:
        description: "Run even if a market calendar reports closed"
        required: false
        default: true
        type: boolean

concurrency:
  # Share a lock with daily/monthly jobs while the Alpha Vantage budget is
  # restored and saved.
  group: jeac-provider-budget
  cancel-in-progress: false

jobs:
  weekly-report:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJSON(vars.ANALYSIS_TIMEOUT_MINUTES || '45') }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Resolve Taipei report date
        id: report-date
        run: echo "value=$(TZ=Asia/Taipei date +%F)" >> "$GITHUB_OUTPUT"
      - name: Restore same-day analysis state
        uses: actions/cache/restore@v4
        with:
          path: data
          key: jeac-same-day-weekly-${{ steps.report-date.outputs.value }}-${{ github.run_id }}
          restore-keys: |
            jeac-same-day-weekly-${{ steps.report-date.outputs.value }}-
      - name: Restore Alpha Vantage daily budget
        uses: actions/cache/restore@v4
        with:
          path: provider_budget
          key: jeac-provider-budget-alphavantage-${{ steps.report-date.outputs.value }}-${{ github.run_id }}
          restore-keys: |
            jeac-provider-budget-alphavantage-${{ steps.report-date.outputs.value }}-
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Build runner-only portfolio master from Secret
        env:
          JEAC_CURRENT_PORTFOLIO_MARKDOWN: ${{ secrets.JEAC_CURRENT_PORTFOLIO_MARKDOWN }}
        run: |
          if [ -z "$JEAC_CURRENT_PORTFOLIO_MARKDOWN" ]; then
            echo "JEAC_CURRENT_PORTFOLIO_MARKDOWN is not configured."
            exit 1
          fi
          printf '%s\n' "$JEAC_CURRENT_PORTFOLIO_MARKDOWN" > 08-01_Current_Portfolio.md
          chmod 600 08-01_Current_Portfolio.md
      - name: Generate weekly report
        env:
          JEAC_WEEKLY_PORTFOLIO_MODE: "true"
          JEAC_WEEKLY_REPORT_STRICT: "true"
          JEAC_WEEKLY_CANDIDATE_LIST: ${{ vars.JEAC_WEEKLY_CANDIDATE_LIST }}
          # The weekly portfolio master, never STOCK_LIST, is the holding source.
          LITELLM_CONFIG: ${{ vars.LITELLM_CONFIG || secrets.LITELLM_CONFIG }}
          LITELLM_CONFIG_YAML: ${{ vars.LITELLM_CONFIG_YAML || secrets.LITELLM_CONFIG_YAML }}
          LITELLM_MODEL: ${{ vars.LITELLM_MODEL || secrets.LITELLM_MODEL }}
          LITELLM_FALLBACK_MODELS: ${{ vars.JEAC_LITELLM_FALLBACK_MODELS || vars.LITELLM_FALLBACK_MODELS || 'openai/qwen/qwen3-32b' }}
          LLM_CHANNELS: ${{ vars.JEAC_LLM_CHANNELS || vars.LLM_CHANNELS || 'groq,openrouter' }}
          LLM_GROQ_PROTOCOL: ${{ vars.LLM_GROQ_PROTOCOL || 'openai' }}
          LLM_GROQ_BASE_URL: ${{ vars.LLM_GROQ_BASE_URL || 'https://api.groq.com/openai/v1' }}
          LLM_GROQ_API_KEYS: ${{ secrets.LLM_GROQ_API_KEYS }}
          LLM_GROQ_MODELS: ${{ vars.LLM_GROQ_MODELS || 'llama-3.3-70b-versatile' }}
          LLM_GROQ_ENABLED: ${{ vars.LLM_GROQ_ENABLED || 'true' }}
          LLM_OPENROUTER_PROTOCOL: ${{ vars.LLM_OPENROUTER_PROTOCOL || 'openai' }}
          LLM_OPENROUTER_BASE_URL: ${{ vars.LLM_OPENROUTER_BASE_URL || 'https://openrouter.ai/api/v1' }}
          LLM_OPENROUTER_API_KEYS: ${{ secrets.LLM_OPENROUTER_API_KEYS }}
          LLM_OPENROUTER_MODELS: ${{ vars.JEAC_OPENROUTER_MODELS || vars.LLM_OPENROUTER_MODELS || 'qwen/qwen3-32b' }}
          LLM_OPENROUTER_ENABLED: ${{ vars.LLM_OPENROUTER_ENABLED || 'true' }}
          LLM_OPENROUTER_MAX_REQUESTS_PER_KEY: ${{ vars.LLM_OPENROUTER_MAX_REQUESTS_PER_KEY || '50' }}
          LLM_OPENROUTER_MAX_REQUESTS_PER_RUN: ${{ vars.WEEKLY_OPENROUTER_MAX_REQUESTS_PER_RUN || '12' }}
          ANALYSIS_PROMPT_PROFILE: ${{ vars.ANALYSIS_PROMPT_PROFILE || 'compact' }}
          ANALYSIS_MAX_OUTPUT_TOKENS: ${{ vars.ANALYSIS_MAX_OUTPUT_TOKENS || '2400' }}
          FUGLE_API_KEY: ${{ secrets.FUGLE_API_KEY }}
          FINMIND_API_TOKEN: ${{ secrets.FINMIND_API_TOKEN }}
          # Optional US-market API fallbacks.  When these are blank, the
          # no-key Nasdaq／FRED public route is attempted after Yahoo Finance,
          # with Stooq retained as a final best-effort fallback.
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          ALPHAVANTAGE_MAX_REQUESTS_PER_DAY: ${{ vars.ALPHAVANTAGE_MAX_REQUESTS_PER_DAY || '25' }}
          ALPHAVANTAGE_BUDGET_FILE: provider_budget/alphavantage.json
          ALPHAVANTAGE_BUDGET_TIMEZONE: ${{ vars.ALPHAVANTAGE_BUDGET_TIMEZONE || 'UTC' }}
          ALPHAVANTAGE_NAME_LOOKUP_ENABLED: ${{ vars.ALPHAVANTAGE_NAME_LOOKUP_ENABLED || 'false' }}
          # News and sentiment evidence.  These must be explicitly mapped:
          # GitHub Actions does not expose arbitrary repository secrets to a run.
          BOCHA_API_KEYS: ${{ secrets.BOCHA_API_KEYS }}
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          SERPAPI_API_KEYS: ${{ secrets.SERPAPI_API_KEYS }}
          MINIMAX_API_KEYS: ${{ secrets.MINIMAX_API_KEYS }}
          BRAVE_API_KEYS: ${{ secrets.BRAVE_API_KEYS }}
          SEARXNG_BASE_URLS: ${{ vars.SEARXNG_BASE_URLS || secrets.SEARXNG_BASE_URLS }}
          SEARXNG_PUBLIC_INSTANCES_ENABLED: ${{ vars.SEARXNG_PUBLIC_INSTANCES_ENABLED || secrets.SEARXNG_PUBLIC_INSTANCES_ENABLED || 'true' }}
          NEWS_INTEL_AUTO_FETCH_ENABLED: ${{ vars.NEWS_INTEL_AUTO_FETCH_ENABLED || 'true' }}
          FUGLE_PRIORITY: ${{ vars.FUGLE_PRIORITY || '0' }}
          FINMIND_PRIORITY: ${{ vars.FINMIND_PRIORITY || '1' }}
          MARKET_REVIEW_ENABLED: ${{ vars.MARKET_REVIEW_ENABLED || 'true' }}
          # Weekly strategy is deliberately scoped to Taiwan and US markets.
          # Do not inherit a generic repository setting here: it can otherwise
          # reintroduce A-share/China market context into the private report.
          MARKET_REVIEW_REGION: "tw,us"
          # All private weekly documents and Markdown reports use Taiwan
          # Traditional Chinese.  Internal JSON keys remain English.
          REPORT_LANGUAGE: "zh-TW"
          # SEPA / Stage 2 / VCP / Pivot require substantially more history
          # than a short daily run.  The pipeline blocks a full weekly report
          # when this core history cannot be retrieved.
          JEAC_WEEKLY_HISTORY_DAYS: "420"
          JEAC_REQUIRE_MARKET_CORE_DATA: "true"
          REPORT_TYPE: full
          # Private delivery: documents are uploaded only to the configured
          # Google Drive folder, never to a public GitHub artifact.
          PRIVATE_REPORT_EXPORT_ENABLED: ${{ vars.PRIVATE_REPORT_EXPORT_ENABLED || 'false' }}
          GOOGLE_DRIVE_REPORT_FOLDER_ID: ${{ vars.GOOGLE_DRIVE_REPORT_FOLDER_ID }}
          GOOGLE_DRIVE_AUTH_MODE: ${{ vars.GOOGLE_DRIVE_AUTH_MODE || 'service_account' }}
          GOOGLE_DRIVE_OAUTH_CLIENT_JSON: ${{ secrets.GOOGLE_DRIVE_OAUTH_CLIENT_JSON }}
          GOOGLE_DRIVE_OAUTH_TOKEN_JSON: ${{ secrets.GOOGLE_DRIVE_OAUTH_TOKEN_JSON }}
          GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON }}
          JEAC_REPORT_KIND: weekly
          JEAC_SAME_DAY_REUSE_ENABLED: ${{ vars.JEAC_SAME_DAY_REUSE_ENABLED || 'true' }}
          JEAC_SAME_DAY_REUSE_DATE: ${{ steps.report-date.outputs.value }}
        run: python main.py --force-run
      - name: Save same-day analysis state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data
          key: jeac-same-day-weekly-${{ steps.report-date.outputs.value }}-${{ github.run_id }}
      - name: Save Alpha Vantage daily budget
        if: always()
        uses: actions/cache/save@v4
        with:
          path: provider_budget
          key: jeac-provider-budget-alphavantage-${{ steps.report-date.outputs.value }}-${{ github.run_id }}
      - name: Upload limited diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          # Never upload reports/: completed DOCX/PPTX files live only in
          # the private Google Drive folder.
          name: jeac-weekly-diagnostics-${{ github.run_number }}
          path: logs/
          retention-days: 7
          if-no-files-found: warn

